workspace = "."
image = "ghcr.io/007/yolopod-base:latest"
namespace = "default"
kubecontext = "kind-yolopod"
setup_script = ""
tools = ["go", "node"]
packages = []
env_vars = ["ANTHROPIC_API_KEY"]

[resources]
cpu = "2"
memory = "4Gi"

[[credentials]]
local = "~/.aws/credentials"
remote = "/home/coder/.aws/credentials"

[[credentials]]
local = "~/.gitconfig"
remote = "/home/coder/.gitconfig"
